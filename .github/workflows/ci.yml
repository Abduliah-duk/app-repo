name: CI and GitOps Trigger

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}

      - name: Update Manifest Repo
        run: |
          git config --global user.email "gitops-bot@example.com"
          git config --global user.name "GitOps Bot"
          # Clone the manifest repo using the PAT secret
          git clone https://x-access-token:${{ secrets.MANIFEST_REPO_TOKEN }}@github.com/your-github-username/manifest-repo.git
          cd manifest-repo
          # Update the image tag in deployment.yaml
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}|g" deployment.yaml
          git add .
          git commit -m "Update image to ${{ github.sha }}"
          git push