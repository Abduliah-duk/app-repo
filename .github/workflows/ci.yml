name: CI/CD GitOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build --platform linux/amd64 -t dukuly99/my-app:${{ github.sha }} .
          docker push dukuly99/my-app:${{ github.sha }}

      - name: Update Manifest Repository
        run: |
          git config --global user.email "gitops-bot@example.com"
          git config --global user.name "GitOps Bot"
          # Clones your manifest repository
          git clone https://x-access-token:${{ secrets.MANIFEST_REPO_TOKEN }}@github.com/${{ github.repository_owner }}/manifest-repo.git
          cd manifest-repo
          # Updates the image tag in deployment.yaml
          sed -i "s|image: .*|image: dukuly99/my-app:${{ github.sha }}|g" deployment.yaml
          git add deployment.yaml
          git commit -m "Update image to ${{ github.sha }}"
          git push